version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: safeops-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-safeops}
      POSTGRES_USER: ${DB_USERNAME:-safeops}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-safeops_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-safeops} -d ${DB_NAME:-safeops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safeops-net

  # ─── Redis Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: safeops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safeops-net

  # ─── Python FastAPI Model Service ─────────────────────────────────
  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile
    container_name: safeops-model-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DATA_DIR: /app/data
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - model_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - safeops-net

  # ─── Spring Boot Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safeops-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-safeops}
      DB_USERNAME: ${DB_USERNAME:-safeops}
      DB_PASSWORD: ${DB_PASSWORD:-safeops_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_SERVICE_HOST: model-service
      MODEL_SERVICE_PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgSldUIHRva2VucyBpbiBTYWZlT3BzIEFJIGJhY2tlbmQ=}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - safeops-net

networks:
  safeops-net:
    driver: bridge

volumes:
  postgres_data:
  model_data:
