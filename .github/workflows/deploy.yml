name: Deploy Nitya Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_IP_ADDRESS: ${{ secrets.EC2_IP_ADDRESS }}
          GIT_REPO: ${{ secrets.GIT_REPO }}
        run: |
          echo "$EC2_SSH_KEY" > myIp.pem
          chmod 400 myIp.pem

          ssh -o StrictHostKeyChecking=no -i myIp.pem ubuntu@$EC2_IP_ADDRESS << 'EOF'
          set -e

          # Install Git if missing
          if ! command -v git >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y git
          fi

          # Install Java Development Kit (JDK 17) if missing (required to compile)
          if ! command -v java >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y openjdk-17-jdk
          fi

          # Install Maven if missing (required to build)
          if ! command -v mvn >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y maven
          fi

          # Install Node.js & PM2 if missing (PM2 is used to manage the process)
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt install -y nodejs
          fi
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          # Add GitHub to known hosts
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          cd /home/ubuntu

          # Clone repository if it doesn't exist
          if [ ! -d "safePlant_mgmt_backend" ]; then
            git clone "$GIT_REPO" safePlant_mgmt_backend
          fi

          cd /home/ubuntu/safePlant_mgmt_backend

          # Pull latest changes
          git fetch origin
          git checkout main
          git pull origin main

          # Build the Java backend on EC2
          cd backend
          mvn clean package -DskipTests

          # Restart using PM2 (runs the jar file using the java interpreter)
          if pm2 describe SAFEOPS-BACKEND-PROD >/dev/null 2>&1; then
            pm2 restart SAFEOPS-BACKEND-PROD --update-env
          else
            pm2 start target/backend-1.0.0.jar \
              --name SAFEOPS-BACKEND-PROD \
              --interpreter java
          fi

          pm2 save
          EOF

      - name: Cleanup
        if: always()
        run: rm -f myIp.pem
